<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-label="OplacalneMieszkanie">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="0.55" stop-color="#0d9488"/>
      <stop offset="1" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="tag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- skyline -->
  <g opacity="0.16" fill="#ffffff">
    <rect x="60"  y="180" width="70"  height="140"/>
    <rect x="150" y="140" width="60"  height="180"/>
    <rect x="230" y="200" width="80"  height="120"/>
    <rect x="980" y="160" width="70"  height="160"/>
    <rect x="1070" y="120" width="60" height="200"/>
    <rect x="1150" y="190" width="80" height="130"/>
  </g>

  <!-- house mark -->
  <g filter="url(#soft)" transform="translate(150 96)">
    <rect x="0" y="60" width="150" height="120" rx="12" fill="#ffffff"/>
    <path d="M-16 70 L75 0 L166 70 Z" fill="url(#tag)"/>
    <rect x="34" y="96" width="38" height="38" rx="6" fill="#0d9488"/>
    <rect x="86" y="96" width="38" height="84" rx="6" fill="#0f766e"/>
    <text x="53" y="150" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#f59e0b" text-anchor="middle">zł</text>
  </g>

  <!-- wordmark -->
  <g transform="translate(360 0)">
    <text x="0" y="150" font-family="Arial, Helvetica, sans-serif" font-size="74" font-weight="800" fill="#ffffff">Opłacalne<tspan fill="url(#tag)">Mieszkanie</tspan></text>
    <text x="4" y="200" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="500" fill="#d1fae5">OLX + Otodom → realna wycena → ranking okazji</text>
    <g transform="translate(4 232)" font-family="Arial, sans-serif" font-size="20" font-weight="600">
      <rect x="0" y="0" width="180" height="40" rx="20" fill="#ffffff" opacity="0.14"/>
      <text x="90" y="26" fill="#ffffff" text-anchor="middle">FastAPI + HTMX</text>
      <rect x="196" y="0" width="190" height="40" rx="20" fill="#ffffff" opacity="0.14"/>
      <text x="291" y="26" fill="#ffffff" text-anchor="middle">RQ + Redis + Postgres</text>
      <rect x="402" y="0" width="210" height="40" rx="20" fill="#ffffff" opacity="0.14"/>
      <text x="507" y="26" fill="#ffffff" text-anchor="middle">skalowalny throughput</text>
    </g>
  </g>
</svg>
