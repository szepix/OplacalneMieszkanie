<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-label="Opłacalne Mieszkanie">
  <defs>
    <filter id="tileShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- flat ink ground -->
  <rect width="1280" height="320" fill="#0e1116"/>

  <!-- subtle editorial keyline -->
  <rect x="20" y="20" width="1240" height="280" rx="18" fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1.5"/>

  <!-- mark: amber tile + minimal house -->
  <g filter="url(#tileShadow)">
    <rect x="80" y="110" width="100" height="100" rx="22" fill="#e8a838"/>
  </g>
  <g fill="#0e1116">
    <path d="M130 126 L165 154 L95 154 Z"/>
    <rect x="104" y="154" width="52" height="40"/>
  </g>
  <rect x="123" y="170" width="14" height="24" fill="#e8a838"/>

  <!-- wordmark (two-tone, weight contrast) -->
  <text x="220" y="160" font-family="'Helvetica Neue', Arial, sans-serif" font-size="70" letter-spacing="-1.5">
    <tspan font-weight="300" fill="#f4f2ec">Opłacalne</tspan><tspan font-weight="800" fill="#e8a838">Mieszkanie</tspan>
  </text>

  <!-- short accent rule -->
  <rect x="222" y="180" width="124" height="3" rx="1.5" fill="#e8a838"/>

  <!-- tagline -->
  <text x="221" y="216" font-family="'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="400" fill="#8b94a3">Znajdź mieszkania tańsze, niż są warte.</text>
</svg>
