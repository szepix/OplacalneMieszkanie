services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: wf
      POSTGRES_PASSWORD: wf
      POSTGRES_DB: wf
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
  redis:
    image: redis:7
    ports: ["6379:6379"]
  web:
    build: .
    command: uvicorn web.app:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql+psycopg://wf:wf@postgres:5432/wf
      REDIS_URL: redis://redis:6379/0
    ports: ["8000:8000"]
    depends_on: [postgres, redis]
  worker:
    build: .
    command: python -m worker.run
    environment:
      DATABASE_URL: postgresql+psycopg://wf:wf@postgres:5432/wf
      REDIS_URL: redis://redis:6379/0
    depends_on: [postgres, redis]
volumes:
  pgdata:
